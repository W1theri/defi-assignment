<svg width="800" height="720" viewBox="0 0 800 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <title>LendingPool Workflow: Deposit → Borrow → Repay → Withdraw</title>
  <desc>Flowchart showing all state transitions in the LendingPool smart contract</desc>

  <!-- Background -->
  <rect width="800" height="720" fill="#ffffff"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1a7a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── START ─────────────────────────────────────── -->
  <rect x="300" y="20" width="200" height="44" rx="22" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="400" y="46" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">User / Borrower</text>

  <line x1="400" y1="64" x2="400" y2="93" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── DEPOSIT ─────────────────────────────────── -->
  <rect x="260" y="95" width="280" height="60" rx="8" fill="#d5f5e3" stroke="#1e8449" stroke-width="1.5"/>
  <text x="400" y="119" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5e33">deposit(amount)</text>
  <text x="400" y="139" text-anchor="middle" font-size="11" fill="#1a5e33">Tokens transferred → collateral stored</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#1a5e33">totalDeposits ↑  |  lastUpdate = now</text>

  <line x1="400" y1="155" x2="400" y2="183" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── POSITION CREATED ───────────────────────── -->
  <rect x="220" y="185" width="360" height="56" rx="8" fill="#d6eaf8" stroke="#1a6fa3" stroke-width="1.5"/>
  <text x="400" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#154972">Position struct</text>
  <text x="400" y="228" text-anchor="middle" font-size="11" fill="#154972">deposited · borrowed · debtWithInterest · lastUpdate</text>

  <line x1="400" y1="241" x2="400" y2="269" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── BORROW ──────────────────────────────────── -->
  <rect x="250" y="271" width="300" height="60" rx="8" fill="#fef9e7" stroke="#b7950b" stroke-width="1.5"/>
  <text x="400" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#7d6608">borrow(amount)</text>
  <text x="400" y="313" text-anchor="middle" font-size="11" fill="#7d6608">Interest accrued · max 75% LTV enforced</text>
  <text x="400" y="326" text-anchor="middle" font-size="11" fill="#7d6608">Tokens transferred out · totalBorrows ↑</text>

  <line x1="400" y1="331" x2="400" y2="359" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── HEALTH FACTOR DIAMOND ─────────────────── -->
  <polygon points="400,361 460,395 400,429 340,395" fill="#fdfefe" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="400" y="389" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">HF ≥ 1.0?</text>
  <text x="400" y="404" text-anchor="middle" font-size="10" fill="#555">(health factor check)</text>

  <!-- YES → left (green) -->
  <text x="312" y="389" text-anchor="middle" font-size="11" fill="#1a7a4a" font-weight="bold">YES</text>
  <line x1="340" y1="395" x2="195" y2="395" stroke="#1a7a4a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- NO → right (red) -->
  <text x="487" y="389" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">NO</text>
  <line x1="460" y1="395" x2="600" y2="395" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- ── REPAY (left branch) ────────────────────── -->
  <rect x="55" y="367" width="140" height="56" rx="8" fill="#d5f5e3" stroke="#1e8449" stroke-width="1.5"/>
  <text x="125" y="391" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5e33">repay(amount)</text>
  <text x="125" y="409" text-anchor="middle" font-size="11" fill="#1a5e33">Debt reduced · interest settled</text>

  <line x1="125" y1="423" x2="125" y2="463" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── WITHDRAW ────────────────────────────────── -->
  <rect x="55" y="465" width="140" height="56" rx="8" fill="#d5f5e3" stroke="#1e8449" stroke-width="1.5"/>
  <text x="125" y="489" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5e33">withdraw()</text>
  <text x="125" y="507" text-anchor="middle" font-size="11" fill="#1a5e33">HF check · tokens returned</text>

  <line x1="125" y1="521" x2="125" y2="561" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- END (success) -->
  <rect x="55" y="563" width="140" height="40" rx="20" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5"/>
  <text x="125" y="587" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5e33">✓ Completed</text>

  <!-- ── LIQUIDATION (right branch) ───────────── -->
  <rect x="600" y="367" width="155" height="56" rx="8" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="677" y="391" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b241c">liquidate(borrower)</text>
  <text x="677" y="409" text-anchor="middle" font-size="11" fill="#7b241c">Repay debt · seize collateral</text>

  <line x1="677" y1="423" x2="677" y2="463" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <rect x="600" y="465" width="155" height="56" rx="8" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="677" y="489" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b241c">+5% bonus paid</text>
  <text x="677" y="507" text-anchor="middle" font-size="11" fill="#7b241c">to liquidator</text>

  <!-- ── INTEREST ACCRUAL side note ────────────── -->
  <rect x="550" y="200" width="210" height="68" rx="8" fill="#f8f0fb" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="655" y="223" text-anchor="middle" font-size="12" font-weight="bold" fill="#6c3483">Interest Model (linear)</text>
  <text x="655" y="241" text-anchor="middle" font-size="11" fill="#6c3483">rate = 2% + 18% × utilisation</text>
  <text x="655" y="257" text-anchor="middle" font-size="11" fill="#6c3483">per-second accrual on every call</text>
  <line x1="550" y1="234" x2="500" y2="300" stroke="#8e44ad" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ── LEGEND ─────────────────────────────────── -->
  <rect x="40" y="640" width="720" height="66" rx="8" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="660" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Legend</text>
  <rect x="60" y="668" width="14" height="14" rx="3" fill="#d5f5e3" stroke="#1e8449"/>
  <text x="80" y="680" font-size="11" fill="#333">Deposit / Repay / Withdraw</text>
  <rect x="225" y="668" width="14" height="14" rx="3" fill="#fef9e7" stroke="#b7950b"/>
  <text x="245" y="680" font-size="11" fill="#333">Borrow</text>
  <rect x="305" y="668" width="14" height="14" rx="3" fill="#fadbd8" stroke="#c0392b"/>
  <text x="325" y="680" font-size="11" fill="#333">Liquidation path</text>
  <rect x="430" y="668" width="14" height="14" rx="3" fill="#d6eaf8" stroke="#1a6fa3"/>
  <text x="450" y="680" font-size="11" fill="#333">Position state</text>
  <rect x="540" y="668" width="14" height="14" rx="3" fill="#f8f0fb" stroke="#8e44ad" stroke-dasharray="5 3"/>
  <text x="560" y="680" font-size="11" fill="#333">Interest model</text>
</svg>
