[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
optimizer = true
optimizer_runs = 200
via_ir = false
# Удалены строки fuzz = ... и invariant = ..., так как они описаны ниже

[profile.default.fuzz]
runs = 1000
seed = "0xdeadbeef"

[profile.default.invariant]
runs = 256
depth = 15
call_override = false

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 512 }

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
goerli = "${GOERLI_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }