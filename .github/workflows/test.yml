name: Smart Contract CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci
  MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
  ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

jobs:
  build:
    name: Build Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: forge install

      - name: Compile contracts
        run: forge build --sizes

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            out/
            cache/
          key: ${{ runner.os }}-forge-${{ hashFiles('src/**/*.sol') }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            out/
            cache/
          key: ${{ runner.os }}-forge-${{ hashFiles('src/**/*.sol') }}

      - name: Install dependencies
        run: forge install

      - name: Run all tests
        run: |
          forge test --gas-report -vvv | tee gas_report.txt

      - name: Upload gas reports
        uses: actions/upload-artifact@v4
        with:
          name: gas-reports
          path: gas_report.txt

  fork-tests:
    name: Fork Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: forge install

      - name: Run fork tests
        if: ${{ env.MAINNET_RPC_URL != '' }}
        run: forge test --match-path "test/ForkTest.t.sol" --fork-url ${{ env.MAINNET_RPC_URL }} -vvv

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither
        run: slither src/ --solc-remaps "@openzeppelin=lib/openzeppelin-contracts" --exclude-dependencies || true

      - name: Upload Slither report
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: |
            slither_report.txt
        continue-on-error: true

  snapshot:
    name: Gas Snapshot
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: forge install

      - name: Take gas snapshot
        run: forge snapshot

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: .gas-snapshot